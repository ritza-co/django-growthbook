{% load static %}
<div class="space-y-4">
  {% for item in cart_items %}
  <div class="flex items-center gap-4 bg-white border border-gray-100 rounded-2xl p-4 shadow-sm">
    <!-- Product image -->
    <div class="w-20 h-20 flex-shrink-0 bg-gray-100 rounded-xl overflow-hidden flex items-center justify-center">
      {% with item.product.images.first as img %}
        {% if img %}
          <img src="{{ img.image.url }}" alt="{{ item.product.name }}" class="w-full h-full object-cover"/>
        {% else %}
          <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        {% endif %}
      {% endwith %}
    </div>

    <!-- Info -->
    <div class="flex-1 min-w-0">
      <h3 class="font-semibold text-gray-900 text-sm truncate">
        <a href="{% url 'storefront:product_detail' item.product.slug %}" class="hover:text-indigo-600">{{ item.product.name }}</a>
      </h3>
      <p class="text-gray-500 text-xs mt-0.5">${{ item.unit_price }} each</p>
    </div>

    <!-- Quantity update -->
    <form method="post" action="{% url 'storefront:cart_update' %}"
          hx-post="{% url 'storefront:cart_update' %}"
          hx-target="#cart-items-container"
          hx-swap="innerHTML"
          class="flex items-center gap-1">
      {% csrf_token %}
      <input type="hidden" name="product_id" value="{{ item.product.pk }}"/>
      <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden">
        <button type="button" name="quantity" value="{{ item.quantity|add:'-1' }}"
                onclick="let i=this.nextElementSibling;if(i.value>1){i.value=parseInt(i.value)-1;this.form.submit()}"
                class="px-2 py-1 text-gray-500 hover:bg-gray-50 text-sm">−</button>
        <input type="number" name="quantity" value="{{ item.quantity }}" min="1"
               class="w-10 text-center text-sm border-0 focus:ring-0 font-medium py-1"
               onchange="this.form.submit()"/>
        <button type="button"
                onclick="let i=this.previousElementSibling;i.value=parseInt(i.value)+1;this.form.submit()"
                class="px-2 py-1 text-gray-500 hover:bg-gray-50 text-sm">+</button>
      </div>
    </form>

    <!-- Line total -->
    <span class="font-bold text-gray-900 text-sm w-20 text-right">${{ item.line_total }}</span>

    <!-- Remove -->
    <form method="post" action="{% url 'storefront:cart_remove' item.product.pk %}"
          hx-post="{% url 'storefront:cart_remove' item.product.pk %}"
          hx-target="#cart-items-container"
          hx-swap="innerHTML">
      {% csrf_token %}
      <button type="submit" class="text-gray-400 hover:text-red-500 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </form>
  </div>
  {% endfor %}

  <!-- Subtotal -->
  <div class="flex justify-end text-base font-bold text-gray-900 px-4 pt-2">
    <span>Subtotal: ${{ subtotal }}</span>
  </div>
</div>
