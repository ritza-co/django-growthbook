<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mt-4">
    <h3 class="text-sm font-semibold text-gray-900 mb-3">Update Order Status</h3>
    <form hx-post="{% url 'orders:order_update_status' order.pk %}"
          hx-target="#status-update-area"
          hx-swap="innerHTML">
        {% csrf_token %}
        <div class="flex gap-3 items-end">
            <div class="flex-1">
                {{ form.status }}
            </div>
            <button type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
                Save
            </button>
            <button type="button"
                    onclick="document.getElementById('status-update-area').innerHTML = ''"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors">
                Cancel
            </button>
        </div>
    </form>
</div>
