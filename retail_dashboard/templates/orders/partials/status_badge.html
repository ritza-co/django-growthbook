<div class="bg-green-50 border border-green-200 rounded-lg p-4 mt-4">
    <p class="text-sm text-green-800 font-medium">
        Status updated to:
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ml-1
            {% if order.status == 'delivered' %}bg-green-100 text-green-800
            {% elif order.status == 'cancelled' %}bg-red-100 text-red-800
            {% elif order.status == 'shipped' %}bg-purple-100 text-purple-800
            {% elif order.status == 'processing' %}bg-indigo-100 text-indigo-800
            {% elif order.status == 'confirmed' %}bg-blue-100 text-blue-800
            {% else %}bg-yellow-100 text-yellow-800{% endif %}">
            {{ order.get_status_display }}
        </span>
    </p>
    <p class="text-xs text-green-600 mt-1">
        <a href="javascript:location.reload()" class="underline hover:no-underline">Refresh page</a> to see the updated timeline.
    </p>
</div>
